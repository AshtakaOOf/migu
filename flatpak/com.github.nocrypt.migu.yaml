app-id: com.github.nocrypt.migu
base: org.electronjs.Electron2.BaseApp
base-version: '23.08'
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: migu-run
separate-locales: false
finish-args:
  - --device=dri
  - --share=ipc
  - --share=network
  - --socket=x11
  - --own-name=org.mpris.MediaPlayer2.chromium.instance3
  - --socket=pulseaudio
  - --filesystem=xdg-videos:rw
  - --filesystem=xdg-run/discord-ipc-0:ro
modules:
  - name: migu
    buildsystem: simple
    build-commands:
      - unzip -j appimage.zip
      - rm appimage.zip
      - chmod +x migu.AppImage
      - ./migu.AppImage --appimage-extract
      - rm migu.AppImage

      - cp squashfs-root/migu.desktop com.github.nocrypt.migu.desktop
      - cp squashfs-root/migu.png com.github.nocrypt.migu.png
      - desktop-file-edit --set-icon com.github.nocrypt.migu --set-key Exec --set-value
        'migu-run %u' com.github.nocrypt.migu.desktop

      - install -D migu-run -t /app/bin
      - install -Dm644 com.github.nocrypt.migu.metainfo.xml -t /app/share/metainfo
      - install -Dm644 com.github.nocrypt.migu.desktop -t /app/share/applications
      - install -Dm644 com.github.nocrypt.migu.png /app/share/icons/hicolor/256x256/apps/com.github.nocrypt.migu.png

      - mv squashfs-root /app/bin/migu
    sources:
      - type: dir
        path: .
      - type: script
        dest-filename: migu-run
        commands:
          - export TMPDIR="$XDG_RUNTIME_DIR/app/$FLATPAK_ID"
          - zypak-wrapper /app/bin/migu/migu "$@"
      - type: file
        path: com.github.nocrypt.migu.metainfo.xml
